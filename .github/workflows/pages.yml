name: Deploy PYRA public website

on:
  push:
    branches: [ "main" ]
    paths:
      - "apps/web/public/**"
      - "apps/api/src/coingecko.js"
      - "packages/pricing/src/**"
      - "scripts/generate-public-barter-credit.js"
      - "scripts/update-public-barter-credit-history.js"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pyra-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static public website
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Generate barter-credit snapshot
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          COINGECKO_API_TIER: ${{ secrets.COINGECKO_API_TIER }}
          PYRA_PUBLIC_MARKET_PAGES: "4"
          PYRA_PUBLIC_MARKET_PAGE_SIZE: "250"
        run: node scripts/generate-public-barter-credit.js apps/web/public/api/barter-credit.json apps/web/public/assets/barter-credit.json

      - name: Update daily barter-credit history
        env:
          PYRA_PUBLIC_HISTORY_URL: https://pyraprotocol.com/api/barter-credit-history.json
        run: node scripts/update-public-barter-credit-history.js apps/web/public/api/barter-credit.json apps/web/public/api/barter-credit-history.json

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload public site
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
